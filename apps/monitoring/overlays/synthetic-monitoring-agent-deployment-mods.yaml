#@ load("@ytt:overlay", "overlay")
#@ load("@ytt:data", "data")
#@overlay/match by=overlay.subset({"kind": "Deployment"})
---
metadata:
  #@overlay/replace
  name: synthetic-monitoring-agent
  #@overlay/replace
  namespace: monitoring
spec:
  selector:
    matchLabels:
      #@overlay/replace
      name: synthetic-monitoring-agent
  template:
    metadata:
      labels:
        #@overlay/replace
        name: synthetic-monitoring-agent
    spec:
      containers:
        #@overlay/match by="name"
        - name: agent
          #@overlay/replace
          image: #@ "grafana/synthetic-monitoring-agent:" + data.values.version
          #@ # Upstream requests 200m/500Mi for enterprise-scale probing; this
          #@ # instance only pings internal devices and sits at a steady ~10Mi/0.5m.
          #@overlay/replace
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          env:
            #@overlay/match by=overlay.subset({"name": "API_TOKEN"})
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  #@overlay/replace
                  name: synthetic-monitoring-api
            #@overlay/match by=overlay.subset({"name": "API_SERVER"})
            - name: API_SERVER
              valueFrom:
                secretKeyRef:
                  #@overlay/replace
                  name: synthetic-monitoring-api
