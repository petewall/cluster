---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 1h0m0s
  url: https://grafana.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-monitoring
  namespace: monitoring
spec:
  chart:
    spec:
      chart: k8s-monitoring
      sourceRef:
        kind: HelmRepository
        name: grafana
  interval: 1h0m0s
  values:
    cluster:
      name: wallhouse
    destinations:
      grafana-cloud-metrics:
        type: prometheus
        urlFrom: nonsensitive(remote.kubernetes.secret.grafana_cloud_metrics.data["metricsUrl"])
        auth:
          type: basic
          usernameKey: metricsUsername
          passwordKey: metricsPassword
        secret:
          create: false
          name: grafana-cloud
      grafana-cloud-logs:
        type: loki
        urlFrom: nonsensitive(remote.kubernetes.secret.grafana_cloud_logs.data["logsUrl"])
        auth:
          type: basic
          usernameKey: logsUsername
          passwordKey: logsPassword
        secret:
          create: false
          name: grafana-cloud

    clusterMetrics:
      enabled: true

    hostMetrics:
      enabled: true
      linuxHosts:
        enabled: true
    
    clusterEvents:
      enabled: true
      clustering:
        enabled: true

    podLogsViaLoki:
      enabled: true

    integrations:
      cert-manager:
        instances:
          - name: cert-manager
            namespaces: [cert-manager]
            labelSelectors:
              app.kubernetes.io/name: cert-manager
      alloy:
        instances:
          - name: alloy
            namespaces: [monitoring]
            labelSelectors:
              app.kubernetes.io/name: [alloy-metrics, alloy-logs, alloy-singleton]

    telemetryServices:
      kube-state-metrics:
        deploy: true
      node-exporter:
        deploy: true

    collectors:
      alloy:
        presets: [clustered, filesystem-log-reader, daemonset]
