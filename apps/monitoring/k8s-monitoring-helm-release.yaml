---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 1h0m0s
  url: https://grafana.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-monitoring
  namespace: monitoring
spec:
  chart:
    spec:
      chart: k8s-monitoring
      version: 4.2.1
      sourceRef:
        kind: HelmRepository
        name: grafana
  interval: 1h0m0s
  values:
    cluster:
      name: wallhouse
    destinations:
      grafana-cloud-metrics:
        type: prometheus
        urlFrom: nonsensitive(remote.kubernetes.secret.grafana_cloud_metrics.data["metricsUrl"])
        auth:
          type: basic
          usernameKey: metricsUsername
          passwordKey: metricsPassword
        secret:
          create: false
          name: grafana-cloud
      grafana-cloud-logs:
        type: loki
        urlFrom: nonsensitive(remote.kubernetes.secret.grafana_cloud_logs.data["logsUrl"])
        auth:
          type: basic
          usernameKey: logsUsername
          passwordKey: logsPassword
        secret:
          create: false
          name: grafana-cloud

    clusterMetrics:
      enabled: true

    hostMetrics:
      enabled: true
      linuxHosts:
        enabled: true

    clusterEvents:
      enabled: true
      clustering: true

    podLogsViaLoki:
      enabled: true

    integrations:
      collector: alloy
      alloy:
        instances:
          - name: alloy
            namespaces: [monitoring]
            labelSelectors:
              app.kubernetes.io/name: alloy

      cert-manager:
        instances:
          - name: cert-manager
            namespaces: [cert-manager]
            labelSelectors:
              app.kubernetes.io/name: cert-manager

      istio:
        instances:
          - name: istio
            sidecarMetrics:
              enabled: true
            istiodMetrics:
              enabled: true
              serviceName: istiod
              namespace: istio-system

    telemetryServices:
      kube-state-metrics:
        deploy: true
        # Passed through to the kube-state-metrics subchart. Sized to observed
        # ~32Mi/4m peak; memory limit for headroom, no CPU limit.
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
      node-exporter:
        deploy: true
        # Passed through to the prometheus-node-exporter subchart; satisfies
        # kube-linter's cpu-request / memory-limit checks.
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi

    alloy-operator:
      # Passed through to the alloy-operator subchart. Sized to observed
      # ~53Mi/11m peak; memory limit for headroom, no CPU limit.
      resources:
        requests:
          cpu: 15m
          memory: 64Mi
        limits:
          memory: 128Mi
      # Resources for the finalizer hook Jobs (add on install, remove+wait on
      # uninstall) — tiny one-shot kubectl runs.
      waitForAlloyRemoval:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi

    collectors:
      alloy:
        presets: [clustered, filesystem-log-reader, daemonset]
