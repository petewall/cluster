---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ollama-helm
  namespace: ollama
spec:
  interval: 1h0m0s
  url: https://otwld.github.io/ollama-helm/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: ollama
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: ollama
      version: 1.66.0
      sourceRef:
        kind: HelmRepository
        name: ollama-helm
  values:
    # Predictable service DNS: ollama.ollama.svc.cluster.local:11434
    fullnameOverride: ollama
    replicaCount: 1

    ollama:
      gpu:
        enabled: false
      models:
        # Pulled on first startup (~4.7Gi over NFS — the initial boot takes
        # several minutes). qwen2.5 has the strongest tool-calling for its size,
        # which HolmesGPT's agentic loop depends on. CPU-only inference here.
        pull:
          - qwen2.5:7b-instruct

    persistentVolume:
      enabled: true
      storageClass: synology-nfs
      size: 30Gi

    service:
      type: ClusterIP
      port: 11434

    # Sized for a 7B Q4 model on CPU (~5-6Gi resident) with headroom on the
    # 16Gi nodes. No CPU limit (repo convention); requests reserve a core.
    resources:
      requests:
        cpu: "1"
        memory: 6Gi
      limits:
        memory: 12Gi

    # Harden what the upstream chart allows. Root is required: ollama writes to
    # /root/.ollama on the NFS PVC, and fsGroup/non-root ownership is unreliable
    # over NFS. Root FS is read-only (models live on the PVC; /tmp is an
    # emptyDir), caps dropped, no privilege escalation.
    securityContext:
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    volumes:
      - name: tmp
        emptyDir: {}
    volumeMounts:
      - name: tmp
        mountPath: /tmp

    # First-boot model pull blocks the readiness gate for minutes; give it room
    # before the probes start failing the pod.
    livenessProbe:
      initialDelaySeconds: 60
      failureThreshold: 30
    readinessProbe:
      initialDelaySeconds: 60
      failureThreshold: 30

  # The chart exposes no annotation values, so mark the accepted run-as-root
  # trait for kube-linter via a postRenderer (inert at runtime; the lint render
  # script applies the same patch so CI and the cluster stay in sync).
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: ollama
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ollama
                annotations:
                  ignore-check.kube-linter.io/run-as-non-root: "ollama writes to /root/.ollama on an NFS-backed PVC; non-root ownership is unreliable over NFS, so it runs as root with a read-only root FS and all caps dropped"
