---
# Weekly right-sizing pass. Reads usage from Grafana Cloud Prometheus, filters to
# significant changes (report.py), has the local Ollama write a plain-English
# summary of them, and posts the result to an evergreen GitHub issue. Report-only
# — it never applies anything.
#
# The LLM only phrases the already-computed facts; report.py does the math. If
# Ollama or GitHub is unreachable the job still logs the deterministic table.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: krr
  namespace: krr
spec:
  schedule: "0 8 * * 1"  # Mondays 08:00 UTC (after Renovate at 06:00)
  suspend: false
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: krr
          restartPolicy: Never
          containers:
            - name: krr
              image: robustadev/krr:v1.28.0
              env:
                # Read-only root FS: redirect any home/cache writes to /tmp.
                - name: HOME
                  value: /tmp
                - name: PROM_URL
                  valueFrom:
                    secretKeyRef:
                      name: krr-prometheus
                      key: url
                - name: PROM_USER
                  valueFrom:
                    secretKeyRef:
                      name: krr-prometheus
                      key: user
                - name: PROM_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: krr-prometheus
                      key: token
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: krr-github
                      key: token
                - name: GITHUB_REPO
                  value: petewall/cluster
                - name: ISSUE_TITLE
                  value: KRR right-sizing recommendations
                - name: KRR_JSON
                  value: /tmp/krr.json
                # Local LLM writes the prose summary (phrasing only).
                - name: OLLAMA_URL
                  value: http://ollama.ollama.svc.cluster.local:11434
                - name: OLLAMA_MODEL
                  value: qwen2.5:7b-instruct
                # Significance thresholds — a change must clear BOTH floors.
                - name: CPU_ABS_FLOOR_M
                  value: "50"
                - name: CPU_PCT_FLOOR
                  value: "25"
                - name: MEM_ABS_FLOOR_MI
                  value: "64"
                - name: MEM_PCT_FLOOR
                  value: "25"
              command:
                - /bin/sh
                - -c
                - >
                  python krr.py simple
                  -p "${PROM_URL}"
                  --prometheus-auth-header "Bearer ${PROM_USER}:${PROM_TOKEN}"
                  --prometheus-ssl-enabled
                  --max-workers 3
                  -f json --fileoutput /tmp/krr.json --logtostderr
                  && python3 /scripts/report.py
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1000
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: report-script
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: tmp
              emptyDir: {}
            - name: report-script
              configMap:
                name: krr-report-script
                defaultMode: 0555
