---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Sets the namespace on generated resources too (the configMapGenerator output
# has none otherwise, which Flux rejects at apply time).
namespace: krr
resources:
  - namespace.yaml
  - rbac.yaml
  - cronjob.yaml
  - prometheus-secret.yaml
  - github-secret.yaml
configMapGenerator:
  - name: krr-report-script
    files:
      - report.py
generatorOptions:
  disableNameSuffixHash: true
