---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - holmes-helm-release.yaml
  # NOTE: this CR's CRD (scheduledhealthchecks.holmesgpt.dev) is installed by
  # the Holmes operator in the HelmRelease above. On a from-scratch bootstrap it
  # must be applied only after the operator is running — if the CRD ever gets
  # torn down, comment this out until the operator re-establishes it.
  - scheduledhealthcheck.yaml
