---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: robusta
  namespace: holmesgpt
spec:
  interval: 1h0m0s
  url: https://robusta-charts.storage.googleapis.com
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: holmes
  namespace: holmesgpt
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: holmes
      version: 0.36.0
      sourceRef:
        kind: HelmRepository
        name: robusta
  values:
    # Fully self-hosted: talk to the in-cluster Ollama, no external LLM key.
    # LiteLLM's ollama_chat provider reads OLLAMA_API_BASE; api_base on the
    # model entry is set too as a belt-and-suspenders.
    additionalEnvVars:
      - name: OLLAMA_API_BASE
        value: http://ollama.ollama.svc.cluster.local:11434
      - name: MODEL
        value: qwen

    modelList:
      qwen:
        model: ollama_chat/qwen2.5:7b-instruct
        api_base: http://ollama.ollama.svc.cluster.local:11434
        temperature: 0

    # Harden. readOnlyRootFilesystem is always true in this chart.
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 10001
      runAsGroup: 10001
      fsGroup: 10001
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    # The operator installs the (Scheduled)HealthCheck CRDs and runs the cron
    # controller that materialises them into HealthCheck runs.
    operator:
      enabled: true
