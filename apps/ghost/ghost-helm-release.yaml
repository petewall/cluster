---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: ghost
  namespace: ghost
spec:
  interval: 1h0m0s
  url: oci://registry-1.docker.io/bitnamicharts/ghost
  ref:
    semver: "^21.0.0"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ghost
  namespace: ghost
spec:
  interval: 1h0m0s
  chartRef:
    name: ghost
    kind: OCIRepository
  values:
    global:
      storageClass: synology-nfs
    ghostHost: petewall.net
    ghostUsername: petewall
    ghostEmail: pete@petewall.net
    ghostBlogTitle: Pete Wall
    existingSecret: ghost-user
    ghostEnableHttps: false
    extraEnvVars:
      - name: ghost__trustProxy
        value: "true"
    customReadinessProbe:
      tcpSocket:
        port: 2368
      initialDelaySeconds: 30
      periodSeconds: 5
      failureThreshold: 6
    service:
      type: ClusterIP
    mysql:
      auth:
        database: ghost_db
        existingSecret: ghost-db
      primary:
        persistence:
          storageClass: synology-nfs
