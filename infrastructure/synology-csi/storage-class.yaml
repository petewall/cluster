---
# Block storage over iSCSI — suitable for databases (proper fsync/locking),
# unlike the NFS class. Thin-provisioned LUNs on the Synology volume.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: synology-iscsi
provisioner: csi.san.synology.com
parameters:
  protocol: 'iscsi'
  location: '/volume1'
  fsType: 'ext4'
reclaimPolicy: Retain
allowVolumeExpansion: true
volumeBindingMode: Immediate
