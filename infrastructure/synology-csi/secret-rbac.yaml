---
# Replaces the upstream cluster-wide `secrets: get,list` grant (removed from both
# ClusterRoles). The DSM credentials are consumed as a volume-mounted secret, so
# this namespaced Role — scoped to the single client-info-secret by name — is the
# most access either component could conceivably need. If a stricter posture is
# wanted this can be dropped entirely (the volume mount needs no API access).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: synology-csi-client-info-reader
  namespace: synology-csi
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["client-info-secret"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: synology-csi-client-info-reader
  namespace: synology-csi
subjects:
  - kind: ServiceAccount
    name: csi-controller-sa
    namespace: synology-csi
  - kind: ServiceAccount
    name: csi-node-sa
    namespace: synology-csi
roleRef:
  kind: Role
  name: synology-csi-client-info-reader
  apiGroup: rbac.authorization.k8s.io
