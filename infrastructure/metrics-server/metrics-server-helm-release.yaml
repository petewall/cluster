---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  interval: 1h
  url: https://kubernetes-sigs.github.io/metrics-server
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: metrics-server
      version: 3.13.1
      sourceRef:
        kind: HelmRepository
        name: metrics-server
  values:
    args:
      # microk8s kubelets serve a self-signed cert that isn't in the cluster CA,
      # so skip verifying it. (Preferred address types already default to
      # InternalIP,ExternalIP,Hostname.)
      - --kubelet-insecure-tls
