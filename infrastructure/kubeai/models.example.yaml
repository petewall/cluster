# EXAMPLE — NOT APPLIED (not listed in kustomization.yaml).
#
# KubeAI serves models defined as Model custom resources. These are the
# "workloads" we deferred, kept here as a copy-paste starting point.
#
# To enable a model:
#   - On a fresh KubeAI install the Model CRD won't exist on the first Flux
#     reconcile. The cleanest GitOps approach is a dedicated Flux Kustomization
#     that `dependsOn` infrastructure (mirroring cluster/ironwall.yaml), so a
#     "no matches for kind Model" error can't block the core infrastructure
#     Kustomization. Then point it at a kustomization that includes the model.
#   - Models scale to zero (minReplicas: 0): they consume nothing until the
#     first request hits the endpoint at  http://kubeai.kubeai/openai/v1
#
# Quick local test of the endpoint (from a pod or via port-forward):
#   curl http://kubeai.kubeai/openai/v1/models
#   curl http://kubeai.kubeai/openai/v1/chat/completions \
#     -d '{"model":"qwen2-5-3b-cpu","messages":[{"role":"user","content":"hi"}]}'

# --- Small CPU model: good for the daily-briefing summarizer today ---
---
apiVersion: kubeai.org/v1
kind: Model
metadata:
  name: qwen2-5-3b-cpu
  namespace: kubeai
spec:
  features: [TextGeneration]
  url: ollama://qwen2.5:3b
  engine: OLlama
  resourceProfile: cpu:2
  minReplicas: 0
  maxReplicas: 1

