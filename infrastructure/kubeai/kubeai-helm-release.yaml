---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kubeai
  namespace: kubeai
spec:
  interval: 1h
  url: https://www.kubeai.org
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubeai
  namespace: kubeai
spec:
  interval: 1h
  chart:
    spec:
      chart: kubeai
      version: 0.23.2
      sourceRef:
        kind: HelmRepository
        name: kubeai
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    # CPU-only for now. The chart ships default resourceProfiles, including
    # "cpu" (used by the example models) and several "nvidia-gpu-*" profiles
    # that already tolerate the nvidia.com/gpu taint.
    replicaCount: 1
    # Headless/async use case — no chat UI. (Its StatefulSet also wants a PVC
    # and there's no default StorageClass, so it would otherwise hang Pending.)
    open-webui:
      enabled: false
    #
    # --- When the GPU node arrives ---
    # 1. Make nodes advertise nvidia.com/gpu: `microk8s enable gpu`, or apply
    #    KubeAI's values-nvidia-k8s-device-plugin.yaml overlay.
    # 2. If the GPU node needs targeting, pin a profile to it, e.g.:
    # resourceProfiles:
    #   nvidia-gpu-rtx4070-8gb:
    #     nodeSelector:
    #       nvidia.com/gpu.present: "true"
    #
    # --- HuggingFace token for hf:// gated/GPU models ---
    # Points KubeAI's config (secretNames.huggingface) at the "huggingface"
    # SealedSecret (key "token") produced by the Makefile in this directory, so
    # model pods get HF_TOKEN. The chart fails to render if create=false
    # without a name.
    secrets:
      huggingface:
        create: false
        name: huggingface
