---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kiali
  namespace: istio-system
spec:
  interval: 1h
  url: https://kiali.org/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kiali-server
  namespace: istio-system
spec:
  interval: 1h
  dependsOn:
    - name: istiod
  chart:
    spec:
      chart: kiali-server
      sourceRef:
        kind: HelmRepository
        name: kiali
  values:
    auth:
      strategy: anonymous
    external_services:
      grafana:
        enabled: false
        internal_url: secret:kiali-grafana-cloud:grafanaUrl
        external_url: secret:kiali-grafana-cloud:grafanaUrl
        auth:
          type: basic
          username: secret:kiali-grafana-cloud:grafanaUser
          password: secret:kiali-grafana-cloud:grafanaToken
      prometheus:
        url: secret:kiali-grafana-cloud:prometheusUrl
        auth:
          type: basic
          username: secret:kiali-grafana-cloud:prometheusUser
          password: secret:kiali-grafana-cloud:prometheusPassword