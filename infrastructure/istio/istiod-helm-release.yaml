---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 1h
  dependsOn:
    - name: istio-base
  chart:
    spec:
      chart: istiod
      version: 1.29.1
      sourceRef:
        kind: HelmRepository
        name: istio
  values:
    pilot:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
