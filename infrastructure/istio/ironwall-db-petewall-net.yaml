---
# External ingress for the ironwall Postgres cluster.
#
# Postgres clients send a plaintext SSLRequest packet before negotiating TLS,
# so the gateway cannot terminate or SNI-route TLS — port 5432 on the
# ingress gateway is dedicated to this one Cluster. TLS is provided
# end-to-end by CNPG's own server cert; clients should use sslmode=require
# (or verify-ca with the CNPG CA exported).
#
# DNS: ironwall-db.petewall.net must resolve to the ingress gateway's
# external IP (managed by infrastructure/dynamic-dns).
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: ironwall-db-petewall-net-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 5432
        name: tcp-postgres
        protocol: TCP
      hosts:
        - "*"
---
# Restrict inbound TCP/5432 to:
#   - the home LAN (192.168.1.0/24)
#   - Grafana Cloud hosted-grafana egress IPs
# Grafana IP source: https://grafana.com/api/hosted-grafana/source-ips.txt
# Refresh this list periodically — Grafana rotates these IPs.
# DENY with notIpBlocks scopes the restriction to port 5432 only,
# so HTTP/HTTPS ingress on 80/443 is unaffected. In-cluster traffic
# (e.g. from other pods in the ironwall namespace) reaches the Cluster
# via ironwall-db-rw directly and never traverses this gateway.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: ironwall-db-ingress-allowlist
  namespace: istio-system
