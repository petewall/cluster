replicaCount: 2

service:
  clusterIP: 10.152.183.10

servers:
  - zones:
      - zone: .
    port: 53
    plugins:
      - name: errors
      - name: health
        configBlock: "lameduck 5s"
      - name: ready
      - name: log
        configBlock: "class error"
      - name: kubernetes
        parameters: cluster.local in-addr.arpa ip6.arpa
        configBlock: |
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
      - name: prometheus
        parameters: :9153
      - name: forward
        parameters: . /etc/resolv.conf
      - name: cache
        parameters: "30"
      - name: loop
      - name: reload
      - name: loadbalance

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: coredns
        topologyKey: kubernetes.io/hostname
