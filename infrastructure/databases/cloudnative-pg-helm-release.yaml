---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cnpg
  namespace: databases
spec:
  interval: 1h0m0s
  url: https://cloudnative-pg.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: databases
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.29.0  # app v1.30.0 — Database + DatabaseRole CRDs
      sourceRef:
        kind: HelmRepository
        name: cnpg
  values:
    # The chart's containerSecurityContext is already hardened (non-root uid
    # 10001, read-only root FS, dropped caps, seccomp). Only resources are
    # unset, which kube-linter flags — set them here.
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
      limits:
        memory: 200Mi
