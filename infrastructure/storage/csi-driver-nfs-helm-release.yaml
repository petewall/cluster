---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: csi-driver-nfs
  namespace: kube-system
spec:
  interval: 10m
  url: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
  namespace: kube-system
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: csi-driver-nfs
      sourceRef:
        kind: HelmRepository
        name: csi-driver-nfs
      interval: 5m
  values:
    controller:
      dnsPolicy: ClusterFirstWithHostNet
    node:
      dnsPolicy: ClusterFirstWithHostNet
    kubeletDir: /var/snap/microk8s/common/var/lib/kubelet
  # The csi-driver-nfs chart exposes no annotation values, so use a kustomize
  # postRenderer to mark the inherent privileged-CSI traits as accepted for
  # kube-linter. These ignore-check annotations are inert at runtime; the lint
  # render script applies the same patches so CI and the cluster stay in sync.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: csi-nfs-controller
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: csi-nfs-controller
                annotations:
                  ignore-check.kube-linter.io/run-as-non-root: "CSI controller mounts NFS on the host and runs as root by design"
                  ignore-check.kube-linter.io/no-read-only-root-fs: "CSI driver needs a writable root filesystem"
                  ignore-check.kube-linter.io/liveness-port: "liveness probe port is a fixed chart detail"
          - target:
              kind: DaemonSet
              name: csi-nfs-node
            patch: |
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: csi-nfs-node
                annotations:
                  ignore-check.kube-linter.io/run-as-non-root: "CSI node driver mounts NFS on the host and runs as root by design"
                  ignore-check.kube-linter.io/no-read-only-root-fs: "CSI driver needs a writable root filesystem"
                  ignore-check.kube-linter.io/liveness-port: "liveness probe port is a fixed chart detail"
