---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ironwall
  namespace: flux-system
spec:
  # Toggle deployment on/off without removing files from the repo.
  # `flux resume kustomization ironwall` also flips this at runtime.
  suspend: true
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  dependsOn:
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/ironwall
  prune: true
  wait: true
