---
name: lint

"on":
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # upload SARIF to the code-scanning / Security tab

jobs:
  kube-linter:
    name: kube-linter (report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Render HelmReleases to plain manifests
        run: make render

      - name: Scan repo with kube-linter
        uses: stackrox/kube-linter-action@v1.0.7
        with:
          directory: .temp/rendered
          config: .kube-linter.yaml
          format: sarif
          output-file: .temp/kube-linter.sarif

      - name: Upload kube-linter SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .temp/kube-linter.sarif
          category: kube-linter
