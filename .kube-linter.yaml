---
# kube-linter configuration. The built-in default checks run unless excluded
# here. Upstream charts (istio, cert-manager, k8s-monitoring, ...) often trip
# checks you can't fix; silence the noisy ones by listing their names under
# checks.exclude, e.g.:
#
#   exclude:
#     - "unset-cpu-requirements"
#     - "unset-memory-requirements"
#     - "no-read-only-root-fs"
#
# Check names: https://docs.kubelinter.io/#/generated/checks
checks:
  exclude:
    # Host-access checks that ONLY the synology-csi node plugin and the
    # node-exporter DaemonSet (k8s-monitoring) trigger. These are inherent to
    # those privileged system components, not misconfigurations:
    #   - synology-csi node plugin: attaches iSCSI devices and mounts into the
    #     host namespace (chroot to /host), must be privileged + host network.
    #     (Its controller is de-privileged in the vendored manifests.)
    #   - node-exporter: reads host metrics, so it needs hostPID, hostNetwork
    #     and read-only mounts of /proc, /sys and /.
    # Nothing else in the cluster legitimately trips these, so excluding them
    # globally loses no meaningful coverage. Checks shared with workloads we do
    # want to harden (run-as-non-root, no-read-only-root-fs, liveness-port,
    # unset-*-requirements) are deliberately NOT excluded here.
    - "privileged-container"          # synology-csi node
    - "privilege-escalation-container"  # synology-csi node
    - "host-network"                  # synology-csi + node-exporter
    - "host-pid"                      # node-exporter
    - "sensitive-host-mounts"         # node-exporter
